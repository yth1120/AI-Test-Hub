# AI TestHub 团队版编排
#  - 仅开发数据库：docker compose up -d db
#  - 全栈（DB + 应用）：docker compose --profile app up -d --build
# 数据库密码、NEXTAUTH_SECRET、WEBHOOK_SECRET 等通过 .env 注入（见 .env.example）。
services:
  db:
    image: pgvector/pgvector:pg16
    container_name: testhub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: testhub
      POSTGRES_PASSWORD: "${DB_PASSWORD:-123456}"
      POSTGRES_DB: testhub
    ports:
      - "5432:5432"
    volumes:
      - testhub-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testhub -d testhub"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    # 默认不随 `up` 启动；用 --profile app 显式启用
    profiles: ["app"]
    build:
      context: .
      dockerfile: Dockerfile
    container_name: testhub-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # 0.0.0.0 让 Next standalone 监听所有接口（容器内 localhost 可连，healthcheck 才能通）
      HOSTNAME: "0.0.0.0"
      # 容器内连库走服务名 db，不是 localhost；密码与 db 服务的 DB_PASSWORD 一致
      DATABASE_URL: "postgresql://testhub:${DB_PASSWORD:-123456}@db:5432/testhub?schema=public"
      NEXTAUTH_URL: "${NEXTAUTH_URL:-http://localhost:3000}"
      NEXTAUTH_SECRET: "${NEXTAUTH_SECRET:?需在 .env 设置 NEXTAUTH_SECRET}"
      WEBHOOK_SECRET: "${WEBHOOK_SECRET:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      GOOGLE_GENERATIVE_AI_API_KEY: "${GOOGLE_GENERATIVE_AI_API_KEY:-}"
      DEEPSEEK_API_KEY: "${DEEPSEEK_API_KEY:-}"
      KIMI_API_KEY: "${KIMI_API_KEY:-}"
      QWEN_API_KEY: "${QWEN_API_KEY:-}"
      AGENT_SANDBOX_ENABLED: "${AGENT_SANDBOX_ENABLED:-false}"
    ports:
      - "3000:3000"
    volumes:
      # 附件持久化（避免容器重建丢文件）
      - testhub-uploads:/app/public/uploads
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  testhub-pgdata:
  testhub-uploads:
